<text x="594" y="286" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="594" dy="0">Code Review</tspan></text>
<text x="594" y="324" text-anchor="start" font-size="22" font-weight="500" fill="#6f737a" opacity="1"><tspan x="594" dy="0">bug / 边界问题</tspan></text>
      <rect x="520" y="378" width="340" height="124" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<circle cx="562" cy="420" r="13" fill="#7a5cff"/>
<text x="594" y="436" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="594" dy="0">架构 Review</tspan></text>
<text x="594" y="474" text-anchor="start" font-size="22" font-weight="500" fill="#6f737a" opacity="1"><tspan x="594" dy="0">模块耦合 / 演进风险</tspan></text>
      <rect x="520" y="528" width="340" height="124" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<circle cx="562" cy="570" r="13" fill="#2fa66a"/>
