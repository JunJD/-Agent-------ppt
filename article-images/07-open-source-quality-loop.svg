  <text x="92" y="190" text-anchor="start" font-size="26" font-weight="500" fill="#6f737a" opacity="1"><tspan x="92" dy="0">不逐行盯代码，而是让 Review 和验证把风险点收回来</tspan></text>
  
      <rect x="100" y="390" width="260" height="120" rx="30" fill="#ffffff" stroke="#e0e6ef" stroke-width="2" opacity="1"/>
