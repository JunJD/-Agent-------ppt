<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M 3 3 L 13 8 L 3 13 z" fill="#9aa3b1"/>
    </marker>
    <style>
      text { font-family: "Hiragino Sans GB", "STHeiti", "PingFang SC", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="180" fill="#dcecff" opacity="0.45"/>
  <circle cx="220" cy="780" r="210" fill="#e9f6ef" opacity="0.55"/>
  <text x="90" y="84" text-anchor="start" font-size="24" font-weight="700" fill="#2f6df6" opacity="1"><tspan x="90" dy="0">Coding Agent 实践</tspan></text>
  <text x="90" y="142" text-anchor="start" font-size="54" font-weight="800" fill="#171717" opacity="1"><tspan x="90" dy="0">BDD .feature：写行为契约</tspan></text>
  <text x="92" y="190" text-anchor="start" font-size="26" font-weight="500" fill="#6f737a" opacity="1"><tspan x="92" dy="0">好的 feature 文件不测实现细节，只锁住用户路径和系统边界</tspan></text>
  
      <g filter="url(#shadow)">
      <rect x="105" y="245" width="620" height="500" rx="36" fill="#ffffff" stroke="#e2e7ef" stroke-width="2" opacity="1"/>
      <text x="150" y="315" text-anchor="start" font-size="34" font-weight="800" fill="#2f6df6" opacity="1"><tspan x="150" dy="0">通用写法</tspan></text>
      <text x="150" y="385" text-anchor="start" font-size="26" font-weight="700" fill="#171717" opacity="1"><tspan x="150" dy="0">功能: 某个产品能力的行为契约</tspan></text>
      <text x="150" y="445" text-anchor="start" font-size="26" font-weight="700" fill="#171717" opacity="1"><tspan x="150" dy="0">场景: 用户完成关键动作后状态正确</tspan></text>
      <text x="150" y="515" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="150" dy="0">假如 初始状态存在</tspan></text>
      <text x="150" y="570" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="150" dy="0">当 用户执行一个动作</tspan></text>
      <text x="150" y="625" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="150" dy="0">那么 可观察结果成立</tspan></text>
      <text x="150" y="680" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="150" dy="0">而且 不破坏关键边界</tspan></text>
      </g>
      <g filter="url(#shadow)">
      <rect x="840" y="245" width="655" height="500" rx="36" fill="#ffffff" stroke="#e2e7ef" stroke-width="2" opacity="1"/>
      <text x="885" y="315" text-anchor="start" font-size="34" font-weight="800" fill="#2fa66a" opacity="1"><tspan x="885" dy="0">Openwork 里的通用类型</tspan></text>
      <rect x="885" y="365" width="220" height="52" rx="26" fill="#2f6df6" stroke="#2f6df6" stroke-width="1" opacity="1"/>
<text x="995" y="399.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="995" dy="0">启动 / 路由</tspan></text>
      <rect x="1130" y="365" width="245" height="52" rx="26" fill="#00a6a6" stroke="#00a6a6" stroke-width="1" opacity="1"/>
<text x="1252.5" y="399.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="1252.5" dy="0">Agent 长任务</tspan></text>
      <rect x="885" y="455" width="275" height="52" rx="26" fill="#2fa66a" stroke="#2fa66a" stroke-width="1" opacity="1"/>
<text x="1022.5" y="489.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="1022.5" dy="0">Workspace 持久化</tspan></text>
      <rect x="1185" y="455" width="230" height="52" rx="26" fill="#c77c11" stroke="#c77c11" stroke-width="1" opacity="1"/>
<text x="1300" y="489.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="1300" dy="0">审批边界</tspan></text>
      <rect x="885" y="545" width="250" height="52" rx="26" fill="#7a5cff" stroke="#7a5cff" stroke-width="1" opacity="1"/>
<text x="1010" y="579.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="1010" dy="0">外部链接安全</tspan></text>
      <rect x="1160" y="545" width="230" height="52" rx="26" fill="#8f98a7" stroke="#8f98a7" stroke-width="1" opacity="1"/>
<text x="1275" y="579.05" text-anchor="middle" font-size="23" font-weight="700" fill="#fff" opacity="1"><tspan x="1275" dy="0">模型状态</tspan></text>
      <text x="885" y="665" text-anchor="start" font-size="27" font-weight="700" fill="#171717" opacity="1"><tspan x="885" dy="0">每个场景都要小而稳：入口、动作、结果、边界。</tspan></text>
      </g>
    
</svg>