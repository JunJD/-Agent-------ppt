<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M 3 3 L 13 8 L 3 13 z" fill="#9aa3b1"/>
    </marker>
    <style>
      text { font-family: "Hiragino Sans GB", "STHeiti", "PingFang SC", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="180" fill="#dcecff" opacity="0.45"/>
  <circle cx="220" cy="780" r="210" fill="#e9f6ef" opacity="0.55"/>
  <text x="90" y="84" text-anchor="start" font-size="24" font-weight="700" fill="#2f6df6" opacity="1"><tspan x="90" dy="0">Coding Agent 实践</tspan></text>
  <text x="90" y="142" text-anchor="start" font-size="54" font-weight="800" fill="#171717" opacity="1"><tspan x="90" dy="0">小产品 / 小 Demo：快速循环</tspan></text>
  <text x="92" y="190" text-anchor="start" font-size="26" font-weight="500" fill="#6f737a" opacity="1"><tspan x="92" dy="0">低重要、低复杂时，目标是把想法尽快变成可体验结果</tspan></text>
  
      <rect x="110" y="280" width="300" height="220" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<rect x="134" y="304" width="68" height="42" rx="21" fill="#2f6df6" stroke="#2f6df6" stroke-width="1" opacity="1"/>
<text x="168" y="332.7" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" opacity="1"><tspan x="168" dy="0">1</tspan></text>
<text x="146" y="380" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="146" dy="0">想到一个点子</tspan></text>
<text x="146" y="434" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="146" dy="0">不需要先写长文档</tspan></text>
      <line x1="410" y1="390" x2="515" y2="390" stroke="#9aa3b1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
      <rect x="515" y="280" width="300" height="220" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<rect x="539" y="304" width="68" height="42" rx="21" fill="#00a6a6" stroke="#00a6a6" stroke-width="1" opacity="1"/>
<text x="573" y="332.7" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" opacity="1"><tspan x="573" dy="0">2</tspan></text>
<text x="551" y="380" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="551" dy="0">直接说给 AI</tspan></text>
<text x="551" y="434" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="551" dy="0">需求边聊边形成</tspan></text>
      <line x1="815" y1="390" x2="920" y2="390" stroke="#9aa3b1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
      <rect x="920" y="280" width="300" height="220" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<rect x="944" y="304" width="68" height="42" rx="21" fill="#2fa66a" stroke="#2fa66a" stroke-width="1" opacity="1"/>
<text x="978" y="332.7" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" opacity="1"><tspan x="978" dy="0">3</tspan></text>
<text x="956" y="380" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="956" dy="0">生成页面</tspan></text>
<text x="956" y="434" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="956" dy="0">先有可体验结果</tspan></text>
      <line x1="1220" y1="390" x2="1325" y2="390" stroke="#9aa3b1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
      <rect x="1325" y="280" width="190" height="220" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<rect x="1349" y="304" width="68" height="42" rx="21" fill="#c77c11" stroke="#c77c11" stroke-width="1" opacity="1"/>
<text x="1383" y="332.7" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" opacity="1"><tspan x="1383" dy="0">4</tspan></text>
<text x="1361" y="380" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="1361" dy="0">体验</tspan></text>
<text x="1361" y="434" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="1361" dy="0">再决定</tspan></text>
      <rect x="330" y="610" width="940" height="86" rx="43" fill="#ffffff" stroke="#dde4ee" stroke-width="2" opacity="1"/>
      <text x="800" y="664" text-anchor="middle" font-size="30" font-weight="800" fill="#171717" opacity="1"><tspan x="800" dy="0">不是追求完美，而是快速判断：这个想法值不值得继续做</tspan></text>
    
</svg>