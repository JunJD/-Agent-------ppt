<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M 3 3 L 13 8 L 3 13 z" fill="#9aa3b1"/>
    </marker>
    <style>
      text { font-family: "Hiragino Sans GB", "STHeiti", "PingFang SC", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="180" fill="#dcecff" opacity="0.45"/>
  <circle cx="220" cy="780" r="210" fill="#e9f6ef" opacity="0.55"/>
  <text x="90" y="84" text-anchor="start" font-size="24" font-weight="700" fill="#2f6df6" opacity="1"><tspan x="90" dy="0">会用顶级 AI 的人</tspan></text>
  <text x="90" y="142" text-anchor="start" font-size="54" font-weight="800" fill="#171717" opacity="1"><tspan x="90" dy="0">效率能高到什么程度？</tspan></text>
  <text x="92" y="190" text-anchor="start" font-size="26" font-weight="500" fill="#6f737a" opacity="1"><tspan x="92" dy="0">不是多写几行代码，而是像一个小型组织一样工作</tspan></text>
  
      <g filter="url(#shadow)">
        <rect x="92" y="285" width="610" height="395" rx="36" fill="#ffffff" stroke="#e4e8ef" stroke-width="2" opacity="1"/>
        <text x="136" y="354" text-anchor="start" font-size="28" font-weight="800" fill="#6f737a" opacity="1"><tspan x="136" dy="0">过去</tspan></text>
        <text x="136" y="420" text-anchor="start" font-size="34" font-weight="700" fill="#171717" opacity="1"><tspan x="136" dy="0">理解需求 → 写代码 → 自测 → </tspan><tspan x="136" dy="46">修问题 → 提交</tspan></text>
        <text x="136" y="584" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="136" dy="0">一个人顺序推进，效率被自己的手速和注意力限制。</tspan></text>
      </g>
      <g filter="url(#shadow)">
        <rect x="820" y="245" width="680" height="475" rx="36" fill="#ffffff" stroke="#dfe7f6" stroke-width="2" opacity="1"/>
        <text x="864" y="314" text-anchor="start" font-size="28" font-weight="800" fill="#2f6df6" opacity="1"><tspan x="864" dy="0">现在</tspan></text>
        <rect x="864" y="365" width="180" height="190" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<circle cx="906" cy="409" r="13" fill="#2f6df6"/>
<text x="900" y="465" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="900" dy="0">拆任务</tspan></text>
<text x="900" y="519" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="900" dy="0">人定义边界</tspan></text>
        <rect x="1072" y="365" width="180" height="190" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<circle cx="1114" cy="409" r="13" fill="#00a6a6"/>
<text x="1108" y="465" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="1108" dy="0">并行做</tspan></text>
<text x="1108" y="519" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="1108" dy="0">Agent 执行</tspan></text>
        <rect x="1280" y="365" width="180" height="190" rx="26" fill="#ffffff" stroke="#e2e6ee" stroke-width="2" opacity="1"/>
<circle cx="1322" cy="409" r="13" fill="#2fa66a"/>
<text x="1316" y="465" text-anchor="start" font-size="34" font-weight="800" fill="#171717" opacity="1"><tspan x="1316" dy="0">回收质量</tspan></text>
<text x="1316" y="519" text-anchor="start" font-size="23" font-weight="500" fill="#6f737a" opacity="1"><tspan x="1316" dy="0">人做判断</tspan></text>
        <text x="864" y="640" text-anchor="start" font-size="30" font-weight="700" fill="#171717" opacity="1"><tspan x="864" dy="0">人负责判断和验收，AI 扩大执行半径。</tspan></text>
      </g>
    
</svg>