<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M 3 3 L 13 8 L 3 13 z" fill="#9aa3b1"/>
    </marker>
    <style>
      text { font-family: "Hiragino Sans GB", "STHeiti", "PingFang SC", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="180" fill="#dcecff" opacity="0.45"/>
  <circle cx="220" cy="780" r="210" fill="#e9f6ef" opacity="0.55"/>
  <text x="90" y="84" text-anchor="start" font-size="24" font-weight="700" fill="#2f6df6" opacity="1"><tspan x="90" dy="0">Coding Agent 实践</tspan></text>
  <text x="90" y="142" text-anchor="start" font-size="54" font-weight="800" fill="#171717" opacity="1"><tspan x="90" dy="0">普通用法 vs 掌控式用法</tspan></text>
  <text x="92" y="190" text-anchor="start" font-size="26" font-weight="500" fill="#6f737a" opacity="1"><tspan x="92" dy="0">差距不在 Prompt，而在任务边界和验收闭环</tspan></text>
  
      <g filter="url(#shadow)">
      <rect x="105" y="250" width="625" height="470" rx="36" fill="#ffffff" stroke="#e5e7ee" stroke-width="2" opacity="1"/>
      <text x="150" y="320" text-anchor="start" font-size="36" font-weight="800" fill="#6f737a" opacity="1"><tspan x="150" dy="0">普通用法</tspan></text>
      <text x="150" y="382" text-anchor="start" font-size="32" font-weight="700" fill="#171717" opacity="1"><tspan x="150" dy="0">需求 → 丢给 AI → 看结果 → </tspan><tspan x="150" dy="43">反复返工</tspan></text>
      <text x="150" y="550" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="150" dy="0">适合小任务；一旦进入跨仓库、长期维护、业务风</tspan><tspan x="150" dy="34">险，容易失控。</tspan></text>
      </g>
      <g filter="url(#shadow)">
      <rect x="870" y="250" width="625" height="470" rx="36" fill="#ffffff" stroke="#dbeafe" stroke-width="2" opacity="1"/>
      <text x="915" y="320" text-anchor="start" font-size="36" font-weight="800" fill="#2f6df6" opacity="1"><tspan x="915" dy="0">掌控式用法</tspan></text>
      <text x="915" y="382" text-anchor="start" font-size="32" font-weight="700" fill="#171717" opacity="1"><tspan x="915" dy="0">定义边界 → 选择模式 → 局部</tspan><tspan x="915" dy="43">执行 → Review → 验收</tspan></text>
      <text x="915" y="582" text-anchor="start" font-size="25" font-weight="500" fill="#6f737a" opacity="1"><tspan x="915" dy="0">人从实现者，变成任务切分者、边界定义者、风险</tspan><tspan x="915" dy="34">判断者。</tspan></text>
      </g>
    
</svg>