<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我与 AI 三年多 · 首页信息图</title>
  <style>
    :root {
      --ink: #171717;
      --paper: #f3efe4;
      --paper-deep: #e1d8c4;
      --accent: #2457d6;
      --accent-2: #c2472f;
      --mute: #6e6a60;
      --line: rgba(23, 23, 23, 0.18);
      --shadow: rgba(23, 23, 23, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1f1f1f;
      color: var(--ink);
      font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    .slide {
      position: relative;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      background:
        radial-gradient(circle at 73% 22%, rgba(36, 87, 214, 0.13), transparent 28%),
        radial-gradient(circle at 30% 78%, rgba(194, 71, 47, 0.11), transparent 24%),
        linear-gradient(135deg, var(--paper) 0%, #fbf8ef 44%, var(--paper-deep) 100%);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(23, 23, 23, 0.038) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 23, 23, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
      z-index: -3;
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(23, 23, 23, 0.12) 0.7px, transparent 0.7px);
      background-size: 5px 5px;
      opacity: 0.18;
      mix-blend-mode: multiply;
      z-index: -2;
    }

    .center {
      position: absolute;
      left: 206px;
      right: 178px;
      top: 150px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 72px;
      align-items: center;
    }

    .copy {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
      font-size: 82px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: 0;
      max-width: 860px;
    }

    .summary {
      width: 760px;
      margin-top: 34px;
      padding-left: 26px;
      border-left: 4px solid var(--ink);
      font-size: 31px;
      line-height: 1.5;
      color: #2d2a25;
    }

    .summary strong {
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
      font-size: 39px;
      font-weight: 700;
    }

    .orbit {
      position: relative;
      width: 320px;
      height: 512px;
    }

    .year {
      position: absolute;
      right: 0;
      width: 228px;
      padding: 19px 22px 20px;
      border: 1px solid var(--line);
      background: rgba(255, 252, 244, 0.54);
      box-shadow: 0 18px 42px var(--shadow);
      backdrop-filter: blur(8px);
    }

    .year:nth-child(2) { top: 0; }
    .year:nth-child(3) { top: 142px; right: 62px; }
    .year:nth-child(4) { bottom: 0; }

    .year::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 27px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--accent);
    }

    .year b {
      display: block;
      font-family: "Playfair Display", "Times New Roman", serif;
      font-size: 54px;
      line-height: 1;
      font-weight: 700;
    }

    .year span {
      display: block;
      margin-top: 10px;
      font-size: 20px;
      line-height: 1.35;
      color: var(--mute);
    }

    .route {
      position: absolute;
      inset: 28px 82px 28px auto;
      width: 2px;
      background: linear-gradient(var(--accent), rgba(194, 71, 47, 0.55), var(--ink));
      opacity: 0.5;
    }

    .signature {
      position: absolute;
      left: 64px;
      bottom: 58px;
      width: 472px;
      padding-top: 28px;
      border-top: 1px solid rgba(23, 23, 23, 0.42);
    }

    .name {
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
    }

    .dept {
      margin-top: 14px;
      font-size: 22px;
      color: var(--mute);
    }

    .footer-note {
      position: absolute;
      right: 64px;
      bottom: 58px;
      width: 390px;
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 17px;
      line-height: 1.55;
      color: var(--mute);
      text-align: right;
    }

    .big-index {
      position: absolute;
      left: 82px;
      top: 232px;
      font-family: "Playfair Display", "Times New Roman", serif;
      font-size: 360px;
      line-height: 0.82;
      color: rgba(23, 23, 23, 0.05);
      z-index: -1;
    }

    .stamp {
      position: absolute;
      right: 300px;
      bottom: 118px;
      width: 148px;
      height: 148px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(23, 23, 23, 0.24);
      border-radius: 50%;
      color: rgba(23, 23, 23, 0.34);
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 15px;
      line-height: 1.35;
      text-align: center;
      transform: rotate(-8deg);
    }
  </style>
</head>
<body>
  <main class="slide" aria-label="我与 AI 三年多分享 PPT 首页信息图">
    <div class="big-index">3+</div>

    <section class="center">
      <div class="copy">
        <h1>三年多，<br />把所有心路历程<br />揉成一份 PPT</h1>
        <p class="summary">
          从 <strong>2023</strong> 到 <strong>2026</strong>，关于 AI 的观察、试错、兴奋、怀疑和重新理解。
          三年多的使用经验，被压缩成一次完整的回看。
        </p>
      </div>

      <aside class="orbit" aria-label="时间线">
        <div class="route"></div>
        <div class="year">
          <b>2023</b>
          <span>第一次真正把 AI 放进日常工作</span>
        </div>
        <div class="year">
          <b>2024-25</b>
          <span>从尝鲜走向方法、协作和边界</span>
        </div>
        <div class="year">
          <b>2026</b>
          <span>回看变化，也重新定义下一步</span>
        </div>
      </aside>
    </section>

    <section class="signature">
      <div class="name">丁俊杰</div>
      <div class="dept">AI项目协同平台</div>
    </section>

    <div class="stamp">SHARING<br />DECK<br />OPENING</div>
    <div class="footer-note">A horizontal magazine-style infographic cover for an internal sharing deck.</div>
  </main>
</body>
</html>
